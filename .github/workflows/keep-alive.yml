name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 */6 * *'   # Runs every 6 days at 9:00 AM UTC
  workflow_dispatch:          # Allows manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app to keep Supabase active
        run: |
          echo "Pinging instagram-couple-trend.vercel.app..."
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://instagram-couple-trend.vercel.app/)
          echo "Response status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✅ Ping successful!"
          else
            echo "❌ Ping failed with status $STATUS"
            exit 1
          fi
